<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="imagens/logo.png">
    <title>Saúde Pélvica</title>
    <link rel="stylesheet" href="CSS/Style.css">
    <script src="JS/JavaScript.js"></script>
</head>
<body>
    <header>
        <button class="menu-mobile" onclick="openMenu()"><img id="menu-btn" src="imagens/Menu_off.png" alt=""></button>
            <img class="logo" src="imagens/logo.png" alt="logo">
            <nav class="links">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Agendar-se</a></li>
                    <li><a href="#" class="esp">Especialidades</a></li>
                    <li><a href="" class="esa">OSO</a></li>
                </ul>
            </nav>
    </header>
    <footer>

      <div class="container">
        <div class="mySlides primeiro">
          <img src="imagens/HOME/Fotos/foto1.png">
        </div>
        <a class="prev" onclick="plusSlides(-1)">❮</a>
        <a class="next" onclick="plusSlides(1)">❯</a>
      
        <div class="mySlides">
          <img src="imagens/HOME/Fotos/foto2.png">
        </div>
      
        <div class="mySlides">
          <img src="imagens/HOME/Fotos/foto3.png">
        </div>
          
        <div class="mySlides">
          <img src="imagens/HOME/Fotos/foto4.png">
        </div>
      
        <div class="mySlides">
          <img src="imagens/HOME/Fotos/foto5.png">
        </div>
          
        <div class="mySlides">
          <img src="imagens/HOME/Fotos/foto6.png">
        </div>
        <div class="row">
          <div class="column">
            <img class="demo cursor" src="imagens/HOME/Fotos/foto1.png" onclick="currentSlide(1)" alt="IMG ">
            <img class="demo cursor" src="imagens/HOME/Fotos/foto2.png" onclick="currentSlide(2)" alt="Cinque Terre">
            <img class="demo cursor" src="imagens/HOME/Fotos/foto3.png" onclick="currentSlide(3)" alt="Mountains and fjords">
            <img class="demo cursor" src="imagens/HOME/Fotos/foto4.png" onclick="currentSlide(4)" alt="Northern Lights">
            <img class="demo cursor" src="imagens/HOME/Fotos/foto5.png" onclick="currentSlide(5)" alt="Nature and sunrise">
            <img class="demo cursor" src="imagens/HOME/Fotos/foto6.png" onclick="currentSlide(6)" alt="Snowy Mountains">
          </div>
      </div>
    </footer>
</body>
</html>
